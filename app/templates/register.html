{% extends "base.html" %}

{% block title %}Регистрация — Quiz Platform{% endblock %}

{% block content %}
<div class="auth-container">
    <h2>Создать аккаунт автора</h2>
    <p>Зарегистрируйтесь, чтобы создавать свои квизы и управлять ими.</p>

    {% if error %}
        <div style="background-color: #ffcccc; color: #cc0000; padding: 10px; border-radius: 5px; margin-bottom: 20px;">
            <strong>Ошибка:</strong> {{ error }}
        </div>
    {% endif %}

    <form action="{{ url_for('auth.register_page') }}" method="POST">
        <div class="form-group">
            <label for="username">Логин:</label><br>
            <input type="text" id="username" name="username" placeholder="Минимум 3 символа" required>
        </div>

        <div class="form-group" style="margin-top: 15px;">
            <label for="password">Пароль:</label><br>
            <input type="password" id="password" name="password" placeholder="Минимум 8 символов, цифра и заглавная буква" required>
        </div>

        <div style="margin-top: 20px;">
            <button type="submit" style="padding: 10px 20px; cursor: pointer;">Зарегистрироваться</button>
        </div>
    </form>

    <p style="margin-top: 20px;">
        Уже есть аккаунт? <a href="{{ url_for('auth.login_page') }}">Войти здесь</a>
    </p>
</div>
{% endblock %}
