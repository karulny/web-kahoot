services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: quiz_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1111}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quiz_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      SQLALCHEMY_DATABASE_URI: postgresql://postgres:${POSTGRES_PASSWORD:-1111}@db:5432/quiz_db
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      FLASK_ENV: ${FLASK_ENV:-production}
    depends_on:
      db:
        condition: service_healthy
    # порт НЕ пробрасываем наружу — nginx сам обращается внутри сети

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    depends_on:
      web:
        condition: service_healthy

volumes:
  postgres_data: