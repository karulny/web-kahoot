{% extends "base.html" %}
{% block title %}Вход — КВИЗСТРОЙ{% endblock %}
{% block navbar %}{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-left">
    <a href="/" class="auth-logo">КВИЗ<span>СТРОЙ</span></a>
    <div class="deco-text"><em>Создавай.</em><br>Играй.<br>Получай данные.</div>
  </div>

  <div class="auth-right">
    <div class="auth-box">
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Вход</button>
        <button class="auth-tab" data-tab="register">Регистрация</button>
      </div>

      <div id="tab-login" class="auth-form">
        <h2>Вход</h2>
        <p class="auth-hint">Управляй квизами</p>
        <div class="field">
          <label>Логин</label>
          <input type="text" id="login-username" placeholder="логин" autocomplete="username">
        </div>
        <div class="field">
          <label>Пароль</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <div id="login-error" class="form-error"></div>
        <button class="btn btn-primary btn-full" onclick="doLogin()">Войти</button>
      </div>

      <div id="tab-register" class="auth-form hidden">
        <h2>Регистрация</h2>
        <p class="auth-hint">Займёт 30 секунд</p>
        <div class="field">
          <label>Логин</label>
          <input type="text" id="reg-username" placeholder="от 3 символов" autocomplete="username">
        </div>
        <div class="field">
          <label>Пароль</label>
          <input type="password" id="reg-password" placeholder="мин. 8 симв., цифра, заглавная" autocomplete="new-password">
        </div>
        <div id="reg-error" class="form-error"></div>
        <button class="btn btn-primary btn-full" onclick="doRegister()">Создать аккаунт</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  document.querySelectorAll('.auth-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.add('hidden'));
      tab.classList.add('active');
      document.getElementById(`tab-${tab.dataset.tab}`).classList.remove('hidden');
    });
  });

  async function doLogin() {
    const username = document.getElementById('login-username').value;
    const password = document.getElementById('login-password').value;
    const err = document.getElementById('login-error');
    err.textContent = '';
    const res = await fetch('/auth/login', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username, password})
    });
    const data = await res.json();
    if (data.success) location.href = '/dashboard';
    else err.textContent = data.message;
  }

  async function doRegister() {
    const username = document.getElementById('reg-username').value;
    const password = document.getElementById('reg-password').value;
    const err = document.getElementById('reg-error');
    err.textContent = '';
    const res = await fetch('/auth/register', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username, password})
    });
    const data = await res.json();
    if (data.success) location.href = '/dashboard';
    else err.textContent = data.message;
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const active = document.querySelector('.auth-tab.active').dataset.tab;
      active === 'login' ? doLogin() : doRegister();
    }
  });
</script>
{% endblock %}
